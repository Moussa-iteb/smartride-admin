<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="assets/logo_smartride.png" alt="SmartRide" height="40" />
      <span class="brand-name">SmartRide</span>
    </div>

    <!-- STEP 1 — Email -->
    <div *ngIf="step === 1">
      <h2 class="auth-title">Forgot Password</h2>
      <p class="auth-sub">Enter your email to receive a reset code</p>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" [(ngModel)]="email" placeholder="your@email.com" />
        </div>
      </div>

      <div class="alert alert-error" *ngIf="error">{{ error }}</div>

      <button class="btn-submit full" (click)="sendCode()" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send Reset Code' }}
      </button>

      <a routerLink="/login" class="back-link">← Back to Login</a>
    </div>

    <!-- STEP 2 — Code + New Password -->
    <div *ngIf="step === 2">
      <h2 class="auth-title">Enter Reset Code</h2>
      <p class="auth-sub">Check your email <strong>{{ email }}</strong></p>

      <div class="form-group">
        <label>Reset Code</label>
        <div class="input-wrap no-icon">
          <input type="text" [(ngModel)]="code" placeholder="e.g. 123456" maxlength="6"
                 style="letter-spacing: 8px; font-size: 22px; text-align: center;" />
        </div>
      </div>

      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap no-icon">
          <input type="password" [(ngModel)]="newPassword" placeholder="Min. 8 characters" />
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap no-icon">
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Repeat password" />
        </div>
      </div>

      <div class="alert alert-error" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success" *ngIf="success">{{ success }}</div>

      <button class="btn-submit full" (click)="resetPassword()" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <a class="back-link" (click)="step = 1" style="cursor:pointer;">← Change email</a>
    </div>

  </div>
</div>
